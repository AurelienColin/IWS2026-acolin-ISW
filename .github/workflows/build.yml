name: Build LaTeX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tectonic
        uses: WtfJoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PDF
        run: make pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: "*.pdf"
